<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Interest Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>College Interest Sign-Up</h1>

    <form id="collegeForm">

      <fieldset>
        <legend>Account Information</legend>

        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Create Password:</label>
        
        <input type="password" id="password" name="password"
          pattern="(?=.*\d).{8,}"
          title="Must contain at least 8 characters and 1 number"
          required>
      </fieldset>

      <fieldset>
        <legend>College Preferences</legend>

        <label for="major">Intended Major:</label>
        <input list="majors" id="major" name="major" required>

        <datalist id="majors">
          <option value="Computer Science">
          <option value="Business">
          <option value="Engineering">
          <option value="Biology">
          <option value="Psychology">
        </datalist>

        <p>Preferred Campus Type:</p>

        <input type="radio" id="urban" name="campus" value="Urban" required>
        <label for="urban">Urban</label>

        <input type="radio" id="suburban" name="campus" value="Suburban">
        <label for="suburban">Suburban</label>

        <input type="radio" id="rural" name="campus" value="Rural">
        <label for="rural">Rural</label>

        <p>Extracurricular Interests:</p>

        <input type="checkbox" id="sports" name="activities" value="Sports">
        <label for="sports">Sports</label>

        <input type="checkbox" id="music" name="activities" value="Music">
        <label for="music">Music</label>

        <input type="checkbox" id="clubs" name="activities" value="Clubs">
        <label for="clubs">Clubs</label>

      </fieldset>

      <input type="submit" value="Submit Application">

    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
